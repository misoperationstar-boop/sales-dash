<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyG60F9k-2O_71qubS9yBaJ_p4p0TNNnWG6GDeHaYFj1GYlLsG9iw-vCIyt-h-sj5t4dA/exec";

  // --- UPDATED USER CREATION LOGIC ---
  document.getElementById('userForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const submitBtn = this.querySelector('button[type="submit"]');
      const originalText = submitBtn.innerText;
      
      // Loading state
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Creating...';

      const userData = {
          action: "addUser",
          id: Date.now(), // Unique ID generate karne ke liye
          name: document.getElementById('newUserId').value.split('@')[0], // Default name from username
          username: document.getElementById('newUserId').value,
          password: document.getElementById('newUserPass').value,
          city: document.getElementById('newCity').value.toLowerCase().trim(),
          role: "user"
      };

      // Google Script ko data bhej rahe hain
      fetch(SCRIPT_URL, {
          method: "POST",
          mode: "no-cors", // Google Script POST requests ke liye zaroori hai
          body: JSON.stringify(userData)
      })
      .then(() => {
          alert(`Success! User for ${userData.city.toUpperCase()} has been created.`);
          const modal = bootstrap.Modal.getInstance(document.getElementById('userModal'));
          modal.hide();
          this.reset();
      })
      .catch(err => {
          console.error("Error adding user:", err);
          alert("Something went wrong. Please check your Script URL.");
      })
      .finally(() => {
          submitBtn.disabled = false;
          submitBtn.innerText = originalText;
      });
  });

  // --- EXISTING LOAD DATA FUNCTION ---
  function loadAllData() {
    fetch(SCRIPT_URL + "?action=read")
      .then(res => res.json())
      .then(data => {
        let rows = "";
        let totalP = 0;
        let cities = new Set();
        let cityDataMap = {}; 
        
        const now = new Date();
        const currentMonth = now.getMonth();
        const currentYear = now.getFullYear();
        document.getElementById('currentMonthName').innerText = now.toLocaleString('default', { month: 'long', year: 'numeric' });

        if(!data || data.length === 0) {
            rows = "<tr><td colspan='5' class='text-center py-5'>No data available.</td></tr>";
        } else {
            data.forEach(item => {
              const profitVal = parseFloat(item.profit) || 0;
              const cityName = (item.city || 'Other').trim().toUpperCase();
              const itemDate = new Date(item.date);
              
              totalP += profitVal;
              cities.add(cityName);

              if (itemDate.getMonth() === currentMonth && itemDate.getFullYear() === currentYear) {
                  if(!cityDataMap[cityName]) cityDataMap[cityName] = { profit: 0, count: 0 };
                  cityDataMap[cityName].profit += profitVal;
                  cityDataMap[cityName].count += 1;
              }

              rows += `
                <tr>
                  <td class="ps-4">
                    <div class="d-flex align-items-center">
                      <div class="stat-icon bg-light text-primary me-2" style="width:32px; height:32px; font-size:12px;"><i class="fas fa-map-pin"></i></div>
                      <span class="fw-bold text-dark text-capitalize">${item.city || '-'}</span>
                    </div>
                  </td>
                  <td>
                    <div class="small fw-bold">E: ${item.enq_no || '-'}</div>
                    <div class="x-small text-muted" style="font-size: 11px;">V: ${item.eval_no || '-'}</div>
                  </td>
                  <td>
                    <div class="x-small text-muted" style="font-size: 11px;">Buy: ₹${Number(item.pur_prc).toLocaleString()}</div>
                    <div class="small fw-bold text-dark">Sell: ₹${Number(item.sale_prc).toLocaleString()}</div>
                  </td>
                  <td>
                    <span class="badge ${profitVal >= 0 ? 'bg-success-subtle text-success border-success' : 'bg-danger-subtle text-danger border-danger'} border px-2 py-1">
                      ₹${profitVal.toLocaleString()}
                    </span>
                  </td>
                  <td class="text-muted small"><i class="far fa-clock me-1"></i>${item.date || '-'}</td>
                </tr>`;
            });
            
            let cityHtml = "";
            Object.keys(cityDataMap).sort().forEach(city => {
                const cData = cityDataMap[city];
                cityHtml += `
                  <div class="col-md-3 col-sm-6 mb-3">
                      <div class="card stat-card city-profit-card h-100 p-3">
                          <div class="d-flex justify-content-between align-items-start mb-2">
                              <div class="stat-icon bg-light text-primary" style="width:35px; height:35px; font-size:14px;"><i class="fas fa-building"></i></div>
                              <span class="badge bg-primary-subtle text-primary" style="font-size:10px;">${cData.count} Sales</span>
                          </div>
                          <p class="city-name text-uppercase fw-bold mb-1">${city}</p>
                          <h4 class="profit-val mb-0">₹${cData.profit.toLocaleString()}</h4>
                          <p class="mb-0 x-small text-muted" style="font-size: 10px;">Monthly Total Income</p>
                      </div>
                  </div>`;
            });
            
            document.getElementById('cityMonthlyContainer').innerHTML = cityHtml || '<div class="col-12 text-center py-3 text-muted">No transactions recorded this month.</div>';
            document.getElementById('totalEnq').innerText = data.length;
            document.getElementById('totalProfit').innerText = "₹ " + totalP.toLocaleString();
            document.getElementById('activeCities').innerText = cities.size;
        }
        document.getElementById('adminTableBody').innerHTML = rows;
      })
      .catch(err => {
        document.getElementById('adminTableBody').innerHTML = `<tr><td colspan='5' class='text-center text-danger'>Sync Error. Check Script.</td></tr>`;
      });
  }

  function logout() { localStorage.clear(); window.location.href = "index.html"; }
  document.getElementById('sidebarCollapse').onclick = () => document.getElementById('sidebar').classList.toggle('active');

  const user = JSON.parse(localStorage.getItem('user'));
  if(!user || user.id !== 'admin') window.location.href = "index.html"; else loadAllData();
</script>
