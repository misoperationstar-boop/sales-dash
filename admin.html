<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Admin Master Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body class="hold-transition sidebar-mini">
<div class="wrapper">
  <nav class="main-header navbar navbar-expand navbar-dark navbar-navy">
    <ul class="navbar-nav ml-auto">
      <li class="nav-item"><a href="#" onclick="logout()" class="nav-link"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
    </ul>
  </nav>

  <div class="content-wrapper p-3" style="margin-left: 0px !important;">
    <div class="card card-navy">
      <div class="card-header">
        <h3 class="card-title"><i class="fas fa-database"></i> All Cities Master Report</h3>
      </div>
      <div class="card-body p-0">
        <table class="table table-striped table-bordered">
          <thead class="bg-light">
            <tr>
              <th>City</th>
              <th>Enq No</th>
              <th>Eval No</th>
              <th>Purchase</th>
              <th>Sale</th>
              <th>Profit</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody id="adminTableBody">
            <tr><td colspan="7" class="text-center">Loading all data...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
  // STEP 1: Yahan apna sahi SCRIPT_URL dalein
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyG60F9k-2O_71qubS9yBaJ_p4p0TNNnWG6GDeHaYFj1GYlLsG9iw-vCIyt-h-sj5t4dA/exec";

  function loadAllData() {
    fetch(SCRIPT_URL + "?action=read")
      .then(res => res.json())
      .then(data => {
        let rows = "";
        if(!data || data.length === 0) {
            rows = "<tr><td colspan='7' class='text-center'>No data found in Google Sheet.</td></tr>";
        } else {
            // Admin ke liye koi filter nahi, sab dikhayega
            data.forEach(item => {
              rows += `<tr>
                <td><span class="badge badge-primary">${item.city || 'N/A'}</span></td>
                <td>${item.enq_no || ''}</td>
                <td>${item.eval_no || ''}</td>
                <td>${item.pur_prc || 0}</td>
                <td>${item.sale_prc || 0}</td>
                <td class="text-bold text-success">${item.profit || 0}</td>
                <td>${item.date || ''}</td>
              </tr>`;
            });
        }
        document.getElementById('adminTableBody').innerHTML = rows;
      })
      .catch(err => {
        console.error(err);
        document.getElementById('adminTableBody').innerHTML = "<tr><td colspan='7' class='text-center text-danger'>Error: Could not fetch data. Check Script URL.</td></tr>";
      });
  }

  function logout() { localStorage.clear(); window.location.href = "index.html"; }

  // Security check: Sirf admin hi dekh sake
  const user = JSON.parse(localStorage.getItem('user'));
  if(!user || user.id !== 'admin') {
      window.location.href = "index.html";
  } else {
      loadAllData();
  }
</script>
</body>
</html>
