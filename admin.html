<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Master Dashboard</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
  
  <style>
    body { background-color: #f4f6f9; }
    .main-header { border-bottom: none !important; }
    .card { border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: none; }
    .card-header { border-radius: 15px 15px 0 0 !important; }
    .table thead th { border-top: none; text-transform: uppercase; font-size: 13px; letter-spacing: 1px; }
    .badge-city { font-size: 0.9rem; padding: 5px 12px; border-radius: 50px; }
    .stats-card { transition: transform 0.3s; }
    .stats-card:hover { transform: translateY(-5px); }
    /* Responsive Table Wrapper */
    .table-responsive { border-radius: 0 0 15px 15px; }
    @media (max-width: 768px) {
      .content-wrapper { padding: 10px !important; }
      .card-title { font-size: 1.1rem; }
    }
  </style>
</head>
<body class="hold-transition layout-top-nav">
<div class="wrapper">
  
  <nav class="main-header navbar navbar-expand-md navbar-dark navbar-navy">
    <div class="container">
      <a href="#" class="navbar-brand">
        <i class="fas fa-chart-line mr-2"></i>
        <span class="brand-text font-weight-light">Sales Master</span>
      </a>
      <ul class="navbar-nav ml-auto">
        <li class="nav-item">
          <button onclick="logout()" class="btn btn-outline-light btn-sm">
            <i class="fas fa-sign-out-alt mr-1"></i> Logout
          </button>
        </li>
      </ul>
    </div>
  </nav>

  <div class="content-wrapper">
    <div class="content-header">
      <div class="container">
        <div class="row mb-2">
          <div class="col-sm-6">
            <h1 class="m-0 text-dark">Welcome, <small>Administrator</small></h1>
          </div>
        </div>
      </div>
    </div>

    <div class="content">
      <div class="container">
        
        <div class="row">
          <div class="col-12 col-sm-6 col-md-3">
            <div class="info-box stats-card">
              <span class="info-box-icon bg-info elevation-1"><i class="fas fa-file-invoice"></i></span>
              <div class="info-box-content">
                <span class="info-box-text">Total Enquiries</span>
                <span class="info-box-number" id="totalEnq">0</span>
              </div>
            </div>
          </div>
          <div class="col-12 col-sm-6 col-md-3">
            <div class="info-box stats-card">
              <span class="info-box-icon bg-success elevation-1"><i class="fas fa-hand-holding-usd"></i></span>
              <div class="info-box-content">
                <span class="info-box-text">Total Profit</span>
                <span class="info-box-number" id="totalProfit">₹ 0</span>
              </div>
            </div>
          </div>
        </div>

        <div class="row mt-3">
          <div class="col-12">
            <div class="card card-outline card-navy">
              <div class="card-header">
                <h3 class="card-title">
                  <i class="fas fa-list mr-1"></i> Master Sales Report
                </h3>
                <div class="card-tools">
                  <button type="button" class="btn btn-tool" onclick="loadAllData()">
                    <i class="fas fa-sync-alt"></i> Refresh
                  </button>
                </div>
              </div>
              <div class="card-body p-0">
                <div class="table-responsive">
                  <table class="table table-hover table-striped mb-0">
                    <thead class="bg-light">
                      <tr>
                        <th>City</th>
                        <th>Enq No</th>
                        <th>Eval No</th>
                        <th>Purchase</th>
                        <th>Sale</th>
                        <th>Profit</th>
                        <th>Date</th>
                      </tr>
                    </thead>
                    <tbody id="adminTableBody">
                      <tr>
                        <td colspan="7" class="text-center py-5">
                          <div class="spinner-border text-navy" role="status"></div>
                          <p class="mt-2">Fetching Master Data...</p>
                        </td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <footer class="main-footer text-center">
    <strong>Copyright &copy; 2026 <a href="#">SalesDash</a>.</strong> All rights reserved.
  </footer>
</div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyG60F9k-2O_71qubS9yBaJ_p4p0TNNnWG6GDeHaYFj1GYlLsG9iw-vCIyt-h-sj5t4dA/exec";

  function loadAllData() {
    fetch(SCRIPT_URL + "?action=read")
      .then(res => res.json())
      .then(data => {
        let rows = "";
        let totalP = 0;
        
        if(!data || data.length === 0) {
            rows = "<tr><td colspan='7' class='text-center py-4 text-muted'>No records found.</td></tr>";
        } else {
            data.forEach(item => {
              const profitValue = parseFloat(item.profit) || 0;
              totalP += profitValue;

              rows += `<tr>
                <td><span class="badge bg-navy badge-city text-capitalize">${item.city || 'N/A'}</span></td>
                <td class="font-weight-bold text-primary">${item.enq_no || '-'}</td>
                <td>${item.eval_no || '-'}</td>
                <td>₹${Number(item.pur_prc).toLocaleString()}</td>
                <td>₹${Number(item.sale_prc).toLocaleString()}</td>
                <td><span class="text-bold ${profitValue >= 0 ? 'text-success' : 'text-danger'}">₹${profitValue.toLocaleString()}</span></td>
                <td class="text-muted"><i class="far fa-calendar-alt mr-1"></i>${item.date || '-'}</td>
              </tr>`;
            });
            
            // Update Summary Stats
            document.getElementById('totalEnq').innerText = data.length;
            document.getElementById('totalProfit').innerText = "₹ " + totalP.toLocaleString();
        }
        document.getElementById('adminTableBody').innerHTML = rows;
      })
      .catch(err => {
        console.error(err);
        document.getElementById('adminTableBody').innerHTML = "<tr><td colspan='7' class='text-center text-danger py-4'>Error loading data. Check Connection.</td></tr>";
      });
  }

  function logout() { 
    localStorage.clear(); 
    window.location.href = "index.html"; 
  }

  // Auth Guard
  const user = JSON.parse(localStorage.getItem('user'));
  if(!user || user.id !== 'admin') {
      window.location.href = "index.html";
  } else {
      loadAllData();
  }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
