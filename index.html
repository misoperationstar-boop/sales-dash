<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Login | CRUD System</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body class="hold-transition login-page">
<div class="login-box">
  <div class="card card-outline card-primary">
    <div class="card-header text-center"><h1><b>Sheet</b>CRUD</h1></div>
    <div class="card-body">
      <p class="login-box-msg">Sign in to start your session</p>
      <form id="loginForm">
        <div class="input-group mb-3">
          <input type="text" id="email" class="form-control" placeholder="User ID / Email" required>
          <div class="input-group-append"><div class="input-group-text"><span class="fas fa-envelope"></span></div></div>
        </div>
        <div class="input-group mb-3">
          <input type="password" id="password" class="form-control" placeholder="Password" required>
          <div class="input-group-append"><div class="input-group-text"><span class="fas fa-lock"></span></div></div>
        </div>
        
        <div class="input-group mb-3" id="cityGroup">
          <input type="text" id="city" class="form-control" placeholder="Enter Your City">
          <div class="input-group-append"><div class="input-group-text"><span class="fas fa-city"></span></div></div>
        </div>

        <button type="submit" class="btn btn-primary btn-block">Sign In</button>
      </form>
    </div>
  </div>
</div>

<script>
  // Apne [dashboard.html](https://github.com/misoperationstar-boop/sales-dash/blob/main/dashboard.html) wala hi URL yahan rakhein
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz3xVMG8iuNUw2OqZDQotN8_xCBNO-JbgYXUhdTrAqi8NKjPtViU2Zm2qOQxm12iWXyLw/exec";

  document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const userVal = document.getElementById('email').value.toLowerCase().trim();
    const passVal = document.getElementById('password').value;
    const cityVal = document.getElementById('city') ? document.getElementById('city').value.trim() : "All";

    // 1. ADMIN CHECK (Sabse Pehle)
    if (userVal === "admin" && passVal === "admin123") {
        const adminData = { id: "admin", city: "All Cities", role: "admin" };
        localStorage.setItem('user', JSON.stringify(adminData));
        console.log("Admin detect hua, redirecting to admin.html");
        window.location.href = "admin.html"; // Ye line admin page par bhejegi
    } 
    // 2. NORMAL USER CHECK
    else if (userVal !== "" && passVal !== "") {
        const userData = { id: userVal, city: cityVal, role: "user" };
        localStorage.setItem('user', JSON.stringify(userData));
        window.location.href = "dashboard.html";
    } 
    else {
        alert("Invalid Details");
    }
});
  // Admin likhne par City box gayab karne ke liye (Optional)
  document.getElementById('email').addEventListener('input', function() {
    if(this.value.toLowerCase() === 'admin') {
      document.getElementById('cityGroup').style.display = 'none';
    } else {
      document.getElementById('cityGroup').style.display = 'flex';
    }
  });
</script>
</body>
</html>
