<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Login | CRUD System</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body class="hold-transition login-page">
<div class="login-box">
  <div class="card card-outline card-primary">
    <div class="card-header text-center"><h1><b>Sheet</b>CRUD</h1></div>
    <div class="card-body">
      <form id="loginForm">
        <div class="input-group mb-3">
          <input type="email" id="email" class="form-control" placeholder="Email" required>
          <div class="input-group-append"><div class="input-group-text"><span class="fas fa-envelope"></span></div></div>
        </div>
        <div class="input-group mb-3">
          <input type="password" id="password" class="form-control" placeholder="Password" required>
          <div class="input-group-append"><div class="input-group-text"><span class="fas fa-lock"></span></div></div>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Sign In</button>
      </form>
    </div>
  </div>
</div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwbEqn_ge2S7R9U7sBIDuM-mYomioC49F6ev7A7DKjX5evEMHJxNJ_f2PLkHm6QmA3o/exec";

  document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const data = { username: id('email').value, password: id('password').value };
    
    fetch(`${SCRIPT_URL}?action=login`, { method: 'POST', body: JSON.stringify(data) })
      .then(res => res.json())
      .then(res => {
        if(res.status === "success") {
          localStorage.setItem('user', JSON.stringify(res));
          window.location.href = "dashboard.html";
        } else {
          alert("Invalid Credentials");
        }
      });
  });
  function id(i){ return document.getElementById(i); }
</script>
</body>
</html>
