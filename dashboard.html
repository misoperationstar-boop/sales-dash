<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>User Sales Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="hold-transition sidebar-mini">
<div class="wrapper">

  <nav class="main-header navbar navbar-expand navbar-white navbar-light">
    <ul class="navbar-nav ml-auto">
      <li class="nav-item"><a href="#" onclick="logout()" class="nav-link text-danger"><i class="fas fa-power-off"></i> Logout</a></li>
    </ul>
  </nav>

  <aside class="main-sidebar sidebar-dark-primary elevation-4">
    <div class="sidebar">
      <nav class="mt-2">
        <ul class="nav nav-pills nav-sidebar flex-column">
          <li class="nav-item"><a href="#" class="nav-link active"><i class="nav-icon fas fa-city"></i> <p>My City Data</p></a></li>
        </ul>
      </nav>
    </div>
  </aside>

  <div class="content-wrapper p-4">
    <div class="card card-outline card-primary">
      <div class="card-header">
        <h3 class="card-title text-bold" id="userCityHeader">Loading...</h3>
        <button class="btn btn-success float-right" data-toggle="modal" data-target="#addModal">
          <i class="fas fa-plus"></i> Add New Entry
        </button>
      </div>
      <div class="card-body p-0">
        <table class="table table-bordered table-striped">
          <thead>
            <tr>
              <th>Enq No</th>
              <th>Eval No</th>
              <th>Pur Price</th>
              <th>Sale Price</th>
              <th>Profit</th>
              <th>MR No</th>
              <th>Date</th>
              <th>City</th> 
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="dataTableBody">
            <tr><td colspan="9" class="text-center">Fetching data from Google Sheets...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="modal fade" id="addModal">
    <div class="modal-dialog">
      <div class="modal-content">
        <form id="salesForm">
          <div class="modal-header bg-success"><h4 class="modal-title">New Entry</h4></div>
          <div class="modal-body">
            <div class="row">
              <div class="col-6 form-group"><label>Enq No</label><input type="text" id="enq_no" class="form-control" required></div>
              <div class="col-6 form-group"><label>Eval No</label><input type="text" id="eval_no" class="form-control" required></div>
            </div>
            <div class="row">
              <div class="col-6 form-group"><label>Purchase</label><input type="number" id="pur_prc" class="form-control" oninput="calcProfit()" required></div>
              <div class="col-6 form-group"><label>Sale</label><input type="number" id="sale_prc" class="form-control" oninput="calcProfit()" required></div>
            </div>
            <div class="form-group"><label>Profit</label><input type="number" id="profit" class="form-control" readonly></div>
            <div class="form-group"><label>MR No</label><input type="text" id="mr_no" class="form-control" required></div>
            <div class="form-group"><label>Date</label><input type="date" id="date" class="form-control" required></div>
            <div class="form-group"><label>City</label><input type="text" id="city_input" class="form-control" required></div>
          </div>
          <div class="modal-footer"><button type="submit" class="btn btn-primary btn-block">Save to Google Sheet</button></div>
        </form>
      </div>
    </div>
  </div>
</div>

<script>
  // YAHAN APNA NAYA DEPLOYMENT URL DALNA HAI
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz3xVMG8iuNUw2OqZDQotN8_xCBNO-JbgYXUhdTrAqi8NKjPtViU2Zm2qOQxm12iWXyLw/exec";
  
  const user = JSON.parse(localStorage.getItem('user'));
  if(!user) { window.location.href = "index.html"; }

  document.getElementById('userCityHeader').innerText = "Dashboard: " + user.city;

  $('#addModal').on('show.bs.modal', function () {
    document.getElementById('city_input').value = user.city;
  });

  function calcProfit() {
    const p = parseFloat($('#pur_prc').val()) || 0;
    const s = parseFloat($('#sale_prc').val()) || 0;
    $('#profit').val(s - p);
  }

  function loadData() {
    fetch(SCRIPT_URL + "?action=read")
      .then(res => res.json())
      .then(data => {
        let rows = "";
        // Yeh line aapki city ka data filter karti hai
        const myData = data.filter(d => d.city.toLowerCase().trim() === user.city.toLowerCase().trim());
        
        if(myData.length === 0) {
          rows = `<tr><td colspan="9" class="text-center text-warning">No records found for ${user.city}. Check Google Sheet!</td></tr>`;
        } else {
          myData.forEach(item => {
            rows += `<tr>
              <td>${item.enq_no}</td><td>${item.eval_no}</td>
              <td>${item.pur_prc}</td><td>${item.sale_prc}</td>
              <td>${item.profit}</td><td>${item.mr_no}</td>
              <td>${item.date}</td>
              <td><span class="badge badge-info">${item.city}</span></td>
              <td><button class="btn btn-danger btn-xs" onclick="deleteRow('${item.id}')"><i class="fas fa-trash"></i></button></td>
            </tr>`;
          });
        }
        document.getElementById('dataTableBody').innerHTML = rows;
      })
      .catch(err => {
        document.getElementById('dataTableBody').innerHTML = `<tr><td colspan="9" class="text-center text-danger">Error: Google Script Blocked (CORS) or URL Wrong.</td></tr>`;
      });
  }

  document.getElementById('salesForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const payload = {
      enq_no: $('#enq_no').val(),
      eval_no: $('#eval_no').val(),
      pur_prc: $('#pur_prc').val(),
      sale_prc: $('#sale_prc').val(),
      profit: $('#profit').val(),
      mr_no: $('#mr_no').val(),
      date: $('#date').val(),
      city: $('#city_input').val()
    };

    fetch(SCRIPT_URL + "?action=add", {
      method: 'POST',
      mode: 'no-cors', 
      body: JSON.stringify(payload)
    }).then(() => {
      alert("Entry Saved! Please wait 2 seconds...");
      $('#addModal').modal('hide');
      document.getElementById('salesForm').reset();
      setTimeout(loadData, 2000);
    });
  });

  function logout() { localStorage.clear(); window.location.href = "index.html"; }
  loadData();
</script>
</body>
</html>
